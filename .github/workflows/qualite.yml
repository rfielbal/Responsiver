name: Qualité

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verifier:
    name: Vérifier le projet
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4
      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Installer les dépendances
        run: npm ci
      - name: Vérifier les types
        run: npm run typecheck
      - name: Exécuter les tests
        run: npm test
      - name: Tester le connecteur Chrome
        run: npm run test:native-host
      - name: Tester la session URL dans Electron
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x1024x24" npm run test:e2e:remote
      - name: Construire l’application
        run: npm run build
      - name: Auditer les dépendances de production
        run: npm audit --omit=dev
