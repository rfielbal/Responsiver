appId: fr.responsiver.desktop
productName: Responsiver
copyright: Copyright © 2026 Responsiver contributors
asar: true
afterPack: build/after-pack.cjs

directories:
  output: dist

files:
  - out/**/*
  - package.json

extraResources:
  - from: demo/atelier
    to: demo/atelier
  - from: extensions/chrome
    to: companion/chrome
  - from: native-host
    to: companion/native-host
    filter:
      - host.mjs
      - protocol.mjs
      - url-policy.mjs
      - spool.mjs
      - register.mjs
      - README.md
      - manifests/**/*
  - from: LICENSE
    to: LICENSE
  - from: NOTICE
    to: NOTICE
  - from: THIRD_PARTY_NOTICES.md
    to: THIRD_PARTY_NOTICES.md
  - from: PRIVACY.md
    to: PRIVACY.md
  - from: SECURITY.md
    to: SECURITY.md

mac:
  icon: build/icon.png
  identity: null
  category: public.app-category.developer-tools
  artifactName: ${productName}-${version}-macOS-${arch}.${ext}
  extendInfo:
    NSAppTransportSecurity:
      NSAllowsArbitraryLoads: false
      NSAllowsLocalNetworking: true
  target:
    - dmg
    - zip

win:
  icon: build/icon.png
  artifactName: ${productName}-${version}-Windows-${arch}.${ext}
  target:
    - nsis
    - zip

linux:
  icon: build/icon.png
  category: Development
  artifactName: ${productName}-${version}-Linux-${arch}.${ext}
  target:
    - AppImage
    - deb

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
